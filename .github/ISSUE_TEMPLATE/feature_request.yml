name: 💡 Feature Request
description: Suggest a brand new idea for this project
title: "[Feature]: "
labels: ["Feature Request", "Triage"]

body:
  - type: input
    id: language
    attributes:
      label: "Translation (optional)"
      description: "If you used a translator, what is your primary language?"
      placeholder: "e.g. Spanish, German, Japanese"
    validations:
      required: false
    
  - type: checkboxes
    id: prechecks
    attributes:
      label: "Before submitting"
      options:
        - label: I have searched existing feature requests (open and closed)
          required: true
        - label: I have reviewed TODO.md for planned features
          required: true
        - label: I have reviews the REJECTED.md for rejected suggestions
          required: true

  - type: textarea
    id: context
    attributes:
      label: "Context / Inspiration"
      description: |
        Where have you seen this idea before? What triggered it?
      placeholder: "I saw this in..."
    validations:
      required: true

  - type: textarea
    id: who
    attributes:
      label: "Who benefits?"
      description: Who would use or benefit from this feature?
      placeholder: "This would help users who..."
    validations:
      required: true

  - type: textarea
    id: where
    attributes:
      label: "Where should this be implemented?"
      description: UI location, backend, workflow, etc.
      placeholder: "This would live in..."
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: "What is the feature?"
      description: Describe the feature clearly
      placeholder: "The feature should..."
    validations:
      required: true

  - type: textarea
    id: when
    attributes:
      label: "When should this happen?"
      description: "Describe the trigger, condition, workflow step, or situation where this feature should apply."
      placeholder: "This should happen when..."
    validations:
      required: false
      
  - type: textarea
    id: why
    attributes:
      label: "Why is this needed?"
      description: |
        What problem does this solve? Why is it valuable?
      placeholder: "This is important because..."
    validations:
      required: true

  - type: textarea
    id: how
    attributes:
      label: "How could this be implemented?"
      description: |
        Optional — outline ideas, logic, or approach if you have one.  This is your idea, and I'm not a mind reader, so please be descriptive.
      placeholder: "This could be done by..."
