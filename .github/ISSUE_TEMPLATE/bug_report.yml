name: "🐞 Report a bug or an issue"
description: "Report issues or unexpected behaviors."
title: "[BUG] "
labels: ["Bug", "Triage"]
assignees: "Pontiac76"

body:
- type: textarea
  id: language
  attributes:
    label: "Translation (optional)"
    description: "If you used a translator, what is your primary language?"
    placeholder: "e.g. Spanish, German, Japanese"
  validations:
    required: false
    
  - type: checkboxes
    id: aiuse
    attributes:
      label: "AI Use"
      description: "Please confirm the following before posting your issue."
      options:
        - label: "I understand that this project may, or does, include AI-assisted code, documentation, or generated content."
          required: true
        - label: "I understand that disruptive, abusive, spammy, or bad-faith participation may result in the issue being closed and the account being blocked from further participation."
          required: true

  - type: input
    id: version
    attributes:
      label: "Version / Commit (if known)"
      description: "Optional — if you're running a specific build, note it here."
      placeholder: "main / commit hash / release tag"
    validations:
      required: false
      
  - type: checkboxes
    id: prerequisites
    attributes:
      label: "Please confirm these before moving forward"
      description: "Please confirm the following before posting your issue."
      options:
        - label: "I have searched open and closed issues and did not find a similar report."
          required: true
        - label: "I have checked TODO.md and REJECTED.md for any relevant notes about this issue."
          required: true
  
  - type: dropdown
    id: suggested_priority
    attributes:
      label: "Optional - Your Suggested Priority"
      description: "This is only a suggestion and does not automatically set issue priority."
      options:
        - Sev:1 - High
        - Sev:2 - Medium
        - Sev:3 - Low
    validations:
      required: false          
      
  - type: textarea
    id: description
    attributes:
      label: "Describe your issue"
      description: "Explain the issue you are experiencing, providing as many details as possible."
      placeholder: "Explain the issue you are experiencing, providing as many details as possible."
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to reproduce the issue"
      description: "How can we reproduce the issue? Please provide detailed steps."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: "A clear description of what you expected to happen."
      placeholder: "I expected the interface to behave like {this} when I do {that}..."
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: "Explain what actually happened instead."
      placeholder: "Instead, I see the behavior as..."
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: "Screenshots or Logs (if applicable)"
      description: "If possible, add screenshots, photos, error messages, or compile logs."
      placeholder: "Paste logs here, or attach screenshots/photos if relevant."
    validations:
      required: false
      
  - type: textarea
    id: additional
    attributes:
      label: "Additional context"
      description: "Any other details or observations that may be helpful."
      placeholder: "Add any other context about the problem here."
    validations:
      required: false

